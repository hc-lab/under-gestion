user www-data;
worker_processes auto;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Logging configuration
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;  # Aumentar nivel de logging

    upstream django {
        server 127.0.0.1:8000;
    }

    server {
        listen 80 default_server;
        server_name _;
        root /var/www/html;
        index index.html;

        # Gzip Settings
        gzip on;
        gzip_disable "msie6";
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Servir archivos estáticos del frontend
        location /static/ {
            alias /var/www/html/static/;
            try_files $uri $uri/ =404;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }

        # Archivos estáticos de Django
        location /django-static/ {
            alias /app/backend/static/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }

        location /media/ {
            alias /app/backend/media/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }

        # Rutas del backend
        location ~ ^/(admin|api)/ {
            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_redirect off;
            proxy_buffering off;
        }

        # Servir index.html para todas las rutas no encontradas
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # Archivos en la raíz
        location = /favicon.ico {
            try_files /favicon.ico =404;
            access_log off;
            expires 30d;
        }

        location = /logo192.png {
            try_files /logo192.png =404;
            access_log off;
            expires 30d;
        }

        location = /logo512.png {
            try_files /logo512.png =404;
            access_log off;
            expires 30d;
        }

        location = /manifest.json {
            try_files /manifest.json =404;
            access_log off;
            expires 30d;
        }

        location = /robots.txt {
            try_files /robots.txt =404;
            access_log off;
            expires 30d;
        }

        # Error handling
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
