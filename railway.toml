[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
buildContext = "."

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.variables]]
key = "PYTHONPATH"
value = "/app/backend"

[[deploy.variables]]
key = "DJANGO_SETTINGS_MODULE"
value = "almacen.settings"

[[deploy.variables]]
key = "DEBUG"
value = "False"

[[deploy.variables]]
key = "ALLOWED_HOSTS"
value = "*"
